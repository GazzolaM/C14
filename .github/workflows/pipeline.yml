name: CI/CD Pipeline Unificado

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  # JOB 1: TESTES
  testes:
    name: Testes Unitários
    runs-on: ubuntu-latest
    steps:
      - name: Checkout do código
        uses: actions/checkout@v4
      
      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
          
      - name: Instalar dependências
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          
      - name: Executar testes com Pytest
        # AJUSTE 1: Adicionado "python -m" para evitar erro de importação do módulo converter
        run: python -m pytest tests/ --junitxml=relatorio-testes.xml
        
      - name: Salvar Relatório de Testes como Artifact
        uses: actions/upload-artifact@v4
        if: always() 
        with:
          name: relatorio-testes
          path: relatorio-testes.xml

  # JOB 2: BUILD
  build:
    name: Build e Empacotamento
    runs-on: ubuntu-latest
    steps:
      - name: Checkout do código
        uses: actions/checkout@v4
        
      - name: Empacotar Aplicação (Build para o GitHub)
        run: zip -r pacote-app.zip . -x "*.git*"
        
      - name: Salvar Pacote como Artifact
        uses: actions/upload-artifact@v4
        with:
          name: pacote-app
          path: pacote-app.zip
          
      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v2
        
      - name: Login no Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}
          
      - name: Build e Push Docker Image
        uses: docker/build-push-action@v4
        with:
          context: .
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/conversor-medidas:latest

  # JOB 3: DEPLOY
  deploy:
    name: Deploy no Railway
    runs-on: ubuntu-latest
    needs: [testes, build]
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Checkout do código
        uses: actions/checkout@v4
        
      - name: Deploy no Railway
        # AJUSTE 2: Atualizado o endereço da Action (railwayapp sem hífen e usando master)
        uses: railwayapp/action-deploy@master
        with:
          railway_token: ${{ secrets.RAILWAY_TOKEN }}

  # JOB 4: NOTIFICAÇÃO
  notificacao:
    name: Enviar Notificação por E-mail
    runs-on: ubuntu-latest
    needs: [deploy]
    if: always() 
    steps:
      - name: Checkout do código
        uses: actions/checkout@v4
        
      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
          
      - name: Executar Script de Notificação
        env:
          EMAIL_DESTINO: ${{ secrets.EMAIL_DESTINO }}
        run: python enviar_notificacao.py